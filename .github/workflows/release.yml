name: Release Windows Bridge

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version
        id: vars
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: pwsh
        run: npm version "${{ steps.vars.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Generate icons
        run: npm run icons

      - name: Check JavaScript syntax
        shell: pwsh
        run: |
          node --check src/main.js
          node --check src/server.js
          node --check scripts/build-win.js
          node --check scripts/generate-icons.js

      - name: Run tests
        run: npm test

      - name: Build Windows installer and portable ZIP
        run: npm run dist:win

      - name: Generate release description
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.vars.outputs.version }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const tagName = context.ref.replace('refs/tags/', '');
            const version = process.env.RELEASE_VERSION || tagName.replace(/^v/, '');
            const buildNumber = process.env.GITHUB_RUN_NUMBER || '1';
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha,
            });
            const generatedBody = String(notes.data.body || '').trim();
            const body = [
              `# Codex Local Bridge ${tagName}`,
              '',
              'Windows tray companion for browser-mediated WordPress chat and image generation through the user-owned local Codex CLI session.',
              '',
              '## Downloads',
              '',
              `- Windows installer: \`Codex-Local-Bridge-${version}-build.${buildNumber}-win-x64.exe\``,
              `- Portable ZIP: \`Codex-Local-Bridge-${version}-build.${buildNumber}-win-x64.zip\``,
              '',
              '## Validation',
              '',
              'This release was built by GitHub Actions after icon generation, JavaScript syntax checks, tests, and Windows packaging completed successfully.',
              '',
              '## Changes',
              '',
              generatedBody || 'No generated changelog entries were returned for this tag.',
              '',
            ].join('\n');

            fs.mkdirSync('dist', { recursive: true });
            fs.writeFileSync(path.join('dist', 'release-notes.md'), body);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/*.exe
            dist/*.zip
